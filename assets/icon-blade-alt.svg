  <!-- crossguard + grip -->
  <path d="M 150 432 L 112 470" stroke="url(#gold)" stroke-width="22" stroke-linecap="round"/>
  <path d="M 120 412 L 196 452" stroke="url(#gold)" stroke-width="16" stroke-linecap="round"/>

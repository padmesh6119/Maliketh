<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E8C873"/>
      <stop offset="0.5" stop-color="#C8A04B"/>
      <stop offset="1" stop-color="#8A6B27"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17171A"/>
      <stop offset="1" stop-color="#0A0A0C"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#tile)"/>
  <rect x="6" y="6" width="500" height="500" rx="106" fill="none" stroke="#C8A04B" stroke-opacity="0.18" stroke-width="3"/>

  <!-- Black Blade: single curved sweep -->
